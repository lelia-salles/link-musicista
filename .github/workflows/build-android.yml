name: Build Musicista Link (Android)

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Make gradlew executable
      # Apontando para a pasta correta do projeto Android
      working-directory: ./android
      run: chmod +x ./gradlew

    - name: Build Android APK
      working-directory: ./android
      run: ./gradlew assembleDebug

    - name: Upload Artifact (.apk)
      uses: actions/upload-artifact@v4
      with:
        name: MusicistaLink-Android
        # Caminho atualizado para capturar o APK de dentro do vendor
        path: vendor/sonobus/android/app/build/outputs/apk/debug/*.apk