name: Build Musicista Link (Windows)

on:
  push:
    branches: [ "main", "master" ] # Trigger on push to main or master branches
  workflow_dispatch: # Allow manual trigger from the GitHub Actions tab

jobs:
  build:
    runs-on: windows-latest # Use the latest Windows Server environment provided by GitHub

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        submodules: recursive # Crucial: fetches all nested C++ dependencies (like JUCE or AOO)

    - name: Configure CMake
      # Configure the build system, specifying the output directory as 'build'
      run: cmake -B build -S .

    - name: Build Project
      # Compile the C++ code using the Release configuration for optimal performance
      run: cmake --build build --config Release

    - name: Upload Artifact (.exe)
      uses: actions/upload-artifact@v4
      with:
        name: MusicistaLink-Windows
        # Upload the generated executable so it can be downloaded. 
        # Note: Adjust this path if your CMake outputs the .exe to a different subfolder.
        path: build/Release/*.exe